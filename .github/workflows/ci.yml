name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poller_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poller_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: python -m pip install -r requirements.txt "pytest>=8.0"
      - name: Ruff lint
        run: |
          python -m pip install "ruff==0.15.20"
          ruff check .
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:55432/poller_test
        run: python -m pytest tests/ -q

  dashboard:
    name: Dashboard tests
    runs-on: ubuntu-latest
    env:
      VISUAL_AUTH_STATE_JSON: ${{ secrets.VISUAL_AUTH_STATE_JSON }}
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Install visual regression browser
        run: npx playwright install --with-deps chromium
      - name: Run public visual regression gate
        run: npm run test:visual:public
      - name: Run authenticated visual regression gate when configured
        if: ${{ env.VISUAL_AUTH_STATE_JSON != '' }}
        run: npm run test:visual
